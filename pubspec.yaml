name: serinus_drift
description: Drift integration for Serinus, allows you to use Serinus with Drift as the database layer.
version: 1.0.1
repository: https://github.com/avesbox/serinus_drift
documentation: https://serinus.app/techniques/database
homepage: https://serinus.app
topics: 
  - dart
  - flutter
  - database
  - drift
  - serinus

environment:
  sdk: ^3.10.0

dependencies:
  drift: '>=2.32.0 <3.0.0'
  drift_postgres: ^1.3.1
  serinus: '>=2.1.7 <3.0.0'

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  build_runner: ^2.13.1
  drift_dev: ^2.32.0
